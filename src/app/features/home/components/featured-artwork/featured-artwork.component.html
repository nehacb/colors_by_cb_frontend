<section class="featured-artwork-section">

  <div class="section-header">

    <div class="section-subtitle">
      Selected Pieces
    </div>

    <h2>
      Featured Artwork
    </h2>

    <p>
      Explore a curated selection of original artwork
      chosen for texture, atmosphere, and emotional presence.
    </p>

  </div>

  <div class="artwork-scroll-container">

    <!-- FEATURED ART -->

    <div *ngFor="let product of products" class="featured-art-card"
    
      [routerLink]="['/products', product.id]">

      <img
        src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=1200"
        alt="Artwork"
      />

      <div class="art-overlay">

      <div class="art-info">
      
        <h3 class="art-title">
          {{ product.name }}
        </h3>
      
        <p class="art-artist">
          by {{ product.artistName }}
        </p>
      
      </div>

        <div class="art-price">
          ₹{{ product.price }}
        </div>

      </div>

    </div>

    </div>

</section>
